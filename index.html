
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gyaan.one | Peer-to-Peer Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF7; scroll-behavior: smooth; overflow-x: hidden; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        .glass-card { 
          background: rgba(255, 255, 255, 0.7); 
          backdrop-filter: blur(10px); 
          border: 1px solid rgba(26, 34, 56, 0.08); 
        }

        .hero-gradient {
          background: radial-gradient(circle at top right, #FDFBF7 0%, #F5F1E8 100%);
        }

        /* Sophisticated Animation Definitions */
        @keyframes premiumFadeIn {
          0% { 
            opacity: 0; 
            transform: translateY(24px) scale(0.98); 
          }
          100% { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
          }
        }

        @keyframes scaleIn {
          from { opacity: 0; transform: scale(0.95); }
          to { opacity: 1; transform: scale(1); }
        }

        @keyframes loading {
          from { width: 0%; }
          to { width: 100%; }
        }

        .animate-in {
          animation: premiumFadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .animate-scale {
          animation: scaleIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* Staggered children entry - up to 12 items */
        .stagger-container > *:nth-child(1) { animation-delay: 0.05s; }
        .stagger-container > *:nth-child(2) { animation-delay: 0.10s; }
        .stagger-container > *:nth-child(3) { animation-delay: 0.15s; }
        .stagger-container > *:nth-child(4) { animation-delay: 0.20s; }
        .stagger-container > *:nth-child(5) { animation-delay: 0.25s; }
        .stagger-container > *:nth-child(6) { animation-delay: 0.30s; }
        .stagger-container > *:nth-child(7) { animation-delay: 0.35s; }
        .stagger-container > *:nth-child(8) { animation-delay: 0.40s; }
        .stagger-container > *:nth-child(9) { animation-delay: 0.45s; }
        .stagger-container > *:nth-child(10) { animation-delay: 0.50s; }
        .stagger-container > *:nth-child(11) { animation-delay: 0.55s; }
        .stagger-container > *:nth-child(12) { animation-delay: 0.60s; }

        ::-webkit-scrollbar {
          width: 8px;
        }
        ::-webkit-scrollbar-track {
          background: #FDFBF7;
        }
        ::-webkit-scrollbar-thumb {
          background: #1A223833;
          border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #1A223855;
        }
    </style>
